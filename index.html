<!-- 【게시물 등록 폼 - Formspree 완전 작동 버전】 -->
<div id="page-post" class="page-section">
    <h3 style="color:var(--primary-blue);">📝 提交发布申请</h3>

    <form id="orderForm" action="https://formspree.io/f/mbdwdegw" method="POST">
        <input type="hidden" name="_subject" value="韩职通 新发布申请">

        <select name="类别" class="form-input" required style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
            <option value="" disabled selected>选择信息分类</option>
            <option value="招聘">招聘</option>
            <option value="二手">二手</option>
            <option value="租房">租房</option>
            <option value="互助">互助</option>
        </select>

        <input type="text" name="联系方式" required placeholder="您的联系电话或微信" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">

        <input type="email" name="email" placeholder="您的邮箱，可不填" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">

        <textarea name="详细内容" rows="8" required placeholder="请输入详细描述" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;"></textarea>

        <button type="submit" class="post-btn-fixed">确认提交审核</button>
    </form>
</div>
