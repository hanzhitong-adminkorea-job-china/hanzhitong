<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한직통 HanZhiTong - 실기능 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 2px solid #2563eb; color: #2563eb; }
        .card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </script>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-blue-600 cursor-pointer" onclick="location.reload()">한직통</h1>
            <div class="space-x-6 hidden md:flex">
                <a href="#" class="hover:text-blue-500 transition">구인정보</a>
                <a href="#" class="hover:text-blue-500 transition">커뮤니티</a>
                <a href="#" class="hover:text-blue-500 transition">고객센터</a>
            </div>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition" onclick="alert('로그인 페이지로 이동합니다.')">로그인</button>
        </div>
    </nav>

    <header class="py-12 bg-white border-b">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h2 class="text-3xl font-extrabold mb-6">당신에게 맞는 직업을 찾아보세요</h2>
            <div class="relative flex items-center">
                <input type="text" id="searchInput" placeholder="직무, 지역, 회사명으로 검색" 
                       class="w-full p-4 border-2 border-gray-200 rounded-full focus:border-blue-500 outline-none transition shadow-lg text-lg">
                <button onclick="handleSearch()" class="absolute right-2 bg-blue-600 text-white px-8 py-3 rounded-full hover:bg-blue-700">검색</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex space-x-4 mb-8 overflow-x-auto pb-2" id="filterBar">
            <button class="filter-btn active-tab px-4 py-2 font-medium" onclick="filterContent('전체')">전체</button>
            <button class="filter-btn px-4 py-2 font-medium text-gray-500" onclick="filterContent('기술직')">기술직</button>
            <button class="filter-btn px-4 py-2 font-medium text-gray-500" onclick="filterContent('서비스직')">서비스직</button>
            <button class="filter-btn px-4 py-2 font-medium text-gray-500" onclick="filterContent('사무직')">사무직</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="jobGrid">
            </div>
    </main>

    <script>
        // 실제 데이터 예시
        const jobData = [
            { id: 1, title: "웹 퍼블리셔 채용", company: "한직통 테크", loc: "서울", type: "기술직", salary: "3500~" },
            { id: 2, title: "카페 매니저 모집", company: "블루커피", loc: "부산", type: "서비스직", salary: "2800~" },
            { id: 3, title: "회계 경리 사원", company: "그린회계", loc: "인천", type: "사무직", salary: "3000~" },
            { id: 4, title: "전기 설비 기사", company: "파워솔루션", loc: "대구", type: "기술직", salary: "4000~" },
        ];

        // 카드 렌더링 함수
        function renderJobs(data) {
            const grid = document.getElementById('jobGrid');
            grid.innerHTML = data.map(job => `
                <div class="card bg-white p-6 rounded-xl shadow-md border border-gray-100 cursor-pointer" onclick="viewDetail(${job.id})">
                    <span class="text-xs font-bold text-blue-500 uppercase">${job.type}</span>
                    <h3 class="text-xl font-bold mt-2">${job.title}</h3>
                    <p class="text-gray-600 mt-1">${job.company} · ${job.loc}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-sm text-gray-500">연봉 ${job.salary}</span>
                        <button class="text-blue-600 font-semibold hover:underline">상세보기 →</button>
                    </div>
                </div>
            `).join('');
        }

        // 검색 기능
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = jobData.filter(job => 
                job.title.toLowerCase().includes(query) || 
                job.company.toLowerCase().includes(query)
            );
            renderJobs(filtered);
        }

        // 필터 기능
        function filterContent(category) {
            // 버튼 스타일 변경
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active-tab');
                btn.classList.add('text-gray-500');
            });
            event.target.classList.add('active-tab');

            // 데이터 필터링
            if(category === '전체') {
                renderJobs(jobData);
            } else {
                const filtered = jobData.filter(job => job.type === category);
                renderJobs(filtered);
            }
        }

        // 상세 페이지 이동 시뮬레이션
        function viewDetail(id) {
            alert(`ID ${id}번 공고의 상세 페이지로 이동합니다.`);
            // location.href = `/detail.html?id=${id}`; // 실제 구현 시 사용
        }

        // 초기 실행
        renderJobs(jobData);

        // 엔터키 검색 지원
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleSearch();
        });
    </script>
</body>
</html>
