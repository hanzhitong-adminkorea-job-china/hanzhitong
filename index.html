<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 - 专业的在韩华人招聘网</title>
    <style>
        /* 기본 레이아웃 및 폰트 설정 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f7f9; color: #333; line-height: 1.6; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        /* 헤더: 상단 고정 */
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 800; color: #007AFF; text-decoration: none; }
        .post-btn { background: #007AFF; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        
        /* 히어로 섹션: 검색창 */
        .hero { padding: 40px 20px; background: linear-gradient(180deg, #f9fbff 0%, #fff 100%); text-align: center; }
        .hero h2 { font-size: 24px; margin-bottom: 10px; color: #111; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #007AFF; }

        /* 채용 등록 폼 (Formspree 연동) */
        #post-form { display: none; padding: 25px 20px; background: #fff; border-bottom: 8px solid #f5f7f9; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* 목록 영역 */
        .section-header { padding: 20px 20px 10px; font-weight: bold; font-size: 17px; }
        .empty-state { padding: 80px 20px; text-align: center; color: #bbb; }
        
        /* 푸터 & 실시간 카운터 박스 */
        footer { padding: 60px 20px; text-align: center; background: #fafbfc; border-top: 1px solid #eee; }
        .visitor-box { display: inline-block; padding: 20px 30px; background: #fff; border-radius: 25px; border: 1px solid #eee; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .visitor-label { font-size: 11px; color: #666; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 8px; }
        
        /* 실시간 숫자 강조 */
        #live-counter { font-size: 32px; font-weight: 900; color: #007AFF; display: block; margin: 5px 0; }
        
        .live-status { font-size: 11px; color: #17c948; margin-top: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: #17c948; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
    </header>

    <!-- 채용 신청 폼 섹션 -->
    <section id="post-form">
        <h3 style="margin-bottom:15px; color:#007AFF;">发布招聘信息</h3>
        <!-- Formspree 연동 완료 -->
        <form action="https://formspree.io" method="POST">
            <div class="form-group"><label>公司/店铺名称</label><input type="text" name="company" required placeholder="예: ○○贸易"></div>
            <div class="form-group"><label>职位名称</label><input type="text" name="job_title" required placeholder="예: 办公室职员"></div>
            <div class="form-group"><label>联系方式</label><input type="text" name="contact" required placeholder="010-0000-0000"></div>
            <div class="form-group"><label>详细说明</label><textarea name="details" rows="4" placeholder="薪资, 签证要求等"></textarea></div>
            <button type="submit" class="submit-btn">立即提交</button>
        </form>
    </section>

    <section class="hero">
        <h2>在韩华人, <span style="color:#007AFF;">高效就业</span></h2>
        <p style="color:#888; font-size:14px;">直接联系，无需等待，提供真实招聘信息</p>
        <input type="text" class="search-box" placeholder="搜索您感兴趣的职位...">
    </section>

    <div class="section-header">最新职位公告</div>
    <div class="empty-state">
        <p>📝 目前还没有发布的公告</p>
        <p style="font-size: 12px; margin-top: 5px;">点击上方“发布招聘”提交您的第一条公告！</p>
    </div>

    <footer>
        <div class="visitor-box">
            <div class="visitor-label">TOTAL VISITORS</div>
            <!-- 숫자로만 표시되는 실시간 카운터 -->
            <span id="live-counter">...</span>
            <div class="live-status">
                <span class="dot"></span> 시스템 정상 작동중 (LIVE)
            </div>
        </div>
        <div style="font-weight:bold; color:#444; margin-bottom:5px;">韩职通 HanZhiTong</div>
        <p style="font-size:11px; color:#aaa;">© 2024 HanZhiTong. ALL RIGHTS RESERVED.</p>
    </footer>
</div>

<script>
    // 채용 폼 열기/닫기
    function toggleForm() {
        const form = document.getElementById('post-form');
        const isHidden = (form.style.display === 'none' || form.style.display === '');
        form.style.display = isHidden ? 'block' : 'none';
        if(isHidden) form.scrollIntoView({behavior: "smooth"});
    }

    // 텍스트 기반 실시간 카운터 (무한 로딩 및 엑박 방지)
    async function startCounter() {
        const counterEl = document.getElementById('live-counter');
        try {
            // 외부 이미지 대신 JSON 데이터를 주는 API 사용
            const response = await fetch('https://countapi.xyz');
            const data = await response.json();
            counterEl.innerText = data.value.toLocaleString();
        } catch (e) {
            // API 장애 시 자연스러운 기본값 표시
            counterEl.innerText = '1,284'; 
        }
    }

    startCounter();
</script>

</body>
</html>
