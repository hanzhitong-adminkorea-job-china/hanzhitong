<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 - 专业的在韩华人招聘网</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f7f9; color: #333; line-height: 1.6; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        /* 헤더 */
        header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 800; color: #007AFF; text-decoration: none; }
        .post-btn { background: #007AFF; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        
        /* 히어로 섹션 */
        .hero { padding: 40px 20px; background: linear-gradient(180deg, #f9fbff 0%, #fff 100%); text-align: center; }
        .hero h2 { font-size: 24px; margin-bottom: 10px; color: #111; }
        .hero p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #007AFF; }

        /* 채용 등록 폼 (기본 숨김) */
        #post-form { display: none; padding: 25px 20px; background: #fff; border-bottom: 8px solid #f5f7f9; }
        .form-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #007AFF; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* 공고 목록 영역 */
        .section-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .section-title { font-weight: bold; font-size: 18px; }
        .empty-state { padding: 60px 20px; text-align: center; color: #bbb; }
        .empty-icon { font-size: 40px; margin-bottom: 10px; display: block; }

        /* 푸터 */
        footer { padding: 50px 20px; text-align: center; background: #f9fbff; border-top: 1px solid #eee; }
        .visitor-box { display: inline-block; padding: 15px 25px; background: #fff; border-radius: 20px; border: 1px solid #eee; margin-bottom: 25px; }
        .visitor-label { font-size: 10px; color: #aaa; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
        .footer-info { font-size: 12px; color: #999; }
        .footer-logo { font-weight: bold; color: #444; font-size: 16px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
    </header>

    <!-- 채용 등록 폼 (Formspree 연동) -->
    <section id="post-form">
        <div class="form-title">发布招聘信息</div>
        <form action="https://formspree.io" method="POST">
            <div class="form-group">
                <label>公司/店铺名称</label>
                <input type="text" name="company_name" required placeholder="예: ○○贸易 / ○○饭店">
            </div>
            <div class="form-group">
                <label>职位名称</label>
                <input type="text" name="job_title" required placeholder="예: 厨师 / 办公室职员">
            </div>
            <div class="form-group">
                <label>联系方式 (电话/微信)</label>
                <input type="text" name="contact_info" required placeholder="예: 010-0000-0000">
            </div>
            <div class="form-group">
                <label>工作地点及要求</label>
                <textarea name="details" rows="4" placeholder="예: 首尔江南, 薪资面议, 签证不限"></textarea>
            </div>
            <button type="submit" class="submit-btn">公开发布</button>
        </form>
    </section>

    <section class="hero">
        <h2>在韩华人, <span style="color:#007AFF;">高效就业</span></h2>
        <p>直接联系，无需等待，提供最真实的招聘信息</p>
        <input type="text" class="search-box" placeholder="搜索关键词 (如: 厨师, 电子厂)">
    </section>

    <div class="section-header">
        <div class="section-title">最新职位公告</div>
    </div>

    <!-- 공고가 없을 때 표시되는 화면 -->
    <div class="empty-state">
        <span class="empty-icon">📝</span>
        <p>目前还没有发布的公告</p>
        <p style="font-size: 13px; margin-top: 5px;">点击上方“发布招聘”提交您的第一条公告！</p>
    </div>

    <footer>
        <div class="visitor-box">
            <div class="visitor-label">TOTAL VISITORS</div>
            <img src="https://seeyoufarm.com" alt="Visitors">
            <div style="font-size: 10px; color: #17c948; margin-top: 10px; font-weight: bold;">
                ● 系统正在运行중 (LIVE)
            </div>
        </div>
        <div class="footer-info">
            <div class="footer-logo">韩职通 HanZhiTong</div>
            <p>© 2024 HanZhiTong. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>
</div>

<script>
    // 폼 보이기/숨기기 함수
    function toggleForm() {
        const form = document.getElementById('post-form');
        const isHidden = form.style.display === 'none' || form.style.display === '';
        form.style.display = isHidden ? 'block' : 'none';
        if (isHidden) {
            form.scrollIntoView({ behavior: 'smooth' });
        }
    }

    // 폼 제출 완료 후 메시지 (선택 사항)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('thanks')) {
        alert('您的招聘信息已提交，审核后将立即发布！');
    }
</script>

</body>
</html>
