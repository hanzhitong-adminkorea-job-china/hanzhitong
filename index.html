<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韩职通 HanZhiTong</title>

<style>
body { font-family: Arial; margin:0; background:#f8f9fa; }
.container { max-width:600px; margin:auto; background:#fff; min-height:100vh; }
header { padding:15px; background:#fff; border-bottom:1px solid #eee; }
.logo { font-weight:bold; color:#007bff; }
.content { padding:15px; }
.page-section { display:none; }
.active-section { display:block; }
.post-btn-fixed {
background:#007bff; color:#fff; border:none;
padding:15px; width:100%; border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<header>
<span class="logo">韩职通 HanZhiTong</span>
</header>

<div class="content">

<!-- 홈 -->
<div id="page-home" class="page-section active-section">

<div style="background:#fff3cd;padding:10px;border-radius:8px;margin-bottom:15px;">
欢迎使用韩职通，发布信息请确保真实有效
</div>

<button onclick="showPage('post')" class="post-btn-fixed">
发布信息
</button>

<!-- 광고 영역 -->
<div style="margin-top:20px; background:#fff3cd; padding:15px; border-radius:12px; border:1px solid #ffe08a;">
<div style="font-weight:bold;">📌 商家广告 / 招聘置顶位 招租中</div>
<p style="font-size:13px;">招聘、租房、店铺宣传可申请首页展示。</p>

<button onclick="showPage('post')" class="post-btn-fixed">
申请置顶 / 发布信息
</button>
</div>

<!-- 🔥 관리자 문의 버튼 -->
<button onclick="showPage('contact')" class="post-btn-fixed" style="background:#495057;">
📩 联系管理员 / 广告咨询
</button>

</div>

<!-- 게시글 폼 -->
<div id="page-post" class="page-section">

<h3>📝 发布信息</h3>

<form id="postForm" action="https://formspree.io/f/mbdwdegw" method="POST">

<input type="hidden" name="_subject" value="韩职通 发布申请">
<input type="hidden" name="_next" value="https://hanzhitong.vercel.app/?thanks=true">

<input type="text" name="_gotcha" style="display:none">

<select name="分类" required style="width:100%;padding:10px;margin-bottom:10px;">
<option value="">选择分类</option>
<option>招聘</option>
<option>二手</option>
<option>租房</option>
<option>互助</option>
</select>

<input type="text" name="标题" required placeholder="标题"
style="width:100%;padding:10px;margin-bottom:10px;">

<input type="text" name="联系方式" required placeholder="联系方式"
style="width:100%;padding:10px;margin-bottom:10px;">

<textarea id="contentInput" name="内容" required placeholder="详细内容(至少10字)"
style="width:100%;padding:10px;margin-bottom:10px;"></textarea>

<input type="text" id="verifyInput" placeholder="请输入123"
style="width:100%;padding:10px;margin-bottom:10px;">

<button type="submit" class="post-btn-fixed">提交</button>

</form>
</div>

<!-- 🔥 관리자 문의 폼 -->
<div id="page-contact" class="page-section">

<h3>📩 联系管理员</h3>

<form id="contactForm" action="https://formspree.io/f/mbdwdegw" method="POST">

<input type="hidden" name="_subject" value="管理员咨询">
<input type="hidden" name="_next" value="https://hanzhitong.vercel.app/?thanks=true">

<input type="text" name="_gotcha" style="display:none">

<input type="text" name="姓名" required placeholder="姓名"
style="width:100%;padding:10px;margin-bottom:10px;">

<input type="text" name="联系方式" required placeholder="联系方式"
style="width:100%;padding:10px;margin-bottom:10px;">

<textarea id="contactContent" name="内容" required placeholder="咨询内容"
style="width:100%;padding:10px;margin-bottom:10px;"></textarea>

<input type="text" id="contactVerify" placeholder="请输入123"
style="width:100%;padding:10px;margin-bottom:10px;">

<button type="submit" class="post-btn-fixed">发送</button>

</form>
</div>

</div>
</div>

<script>

function showPage(page){
document.querySelectorAll('.page-section').forEach(e=>e.classList.remove('active-section'));
document.getElementById('page-'+page).classList.add('active-section');
}

// 성공 알림
window.onload = function(){
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('thanks')==='true'){
alert('提交成功！');
window.history.replaceState({}, document.title, window.location.pathname);
}
}

// 🔥 스팸 방지
let lastSubmit=0;
let lastContact=0;

document.addEventListener("DOMContentLoaded",function(){

const postForm=document.getElementById("postForm");
if(postForm){
postForm.addEventListener("submit",function(e){

const now=Date.now();
const verify=document.getElementById("verifyInput").value.trim();
const content=document.getElementById("contentInput").value.trim();

if(now-lastSubmit<5000){
alert("提交太快");
e.preventDefault();return;
}

if(verify!=="123"){
alert("请输入123");
e.preventDefault();return;
}

if(content.length<10){
alert("内容太短");
e.preventDefault();return;
}

lastSubmit=now;
});
}

const contactForm=document.getElementById("contactForm");
if(contactForm){
contactForm.addEventListener("submit",function(e){

const now=Date.now();
const verify=document.getElementById("contactVerify").value.trim();
const content=document.getElementById("contactContent").value.trim();

if(now-lastContact<5000){
alert("提交太快");
e.preventDefault();return;
}

if(verify!=="123"){
alert("请输入123");
e.preventDefault();return;
}

if(content.length<5){
alert("内容太短");
e.preventDefault();return;
}

lastContact=now;
});
}

});

</script>

</body>
</html>
