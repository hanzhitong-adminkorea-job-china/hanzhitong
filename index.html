<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 HanZhiTong</title>
    <style>
        :root { --primary-blue: #007bff; --accent-gold: #ffc107; --bg-gray: #f8f9fa; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary-blue); text-decoration: none; }
        .post-btn { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-size: 14px; cursor: pointer; font-weight: bold; }

        .content { padding: 20px; }

        /* 1. 搜索框 */
        .search-section { margin-bottom: 20px; }
        .search-box { display: flex; border: 2px solid var(--primary-blue); border-radius: 12px; overflow: hidden; }
        .search-box input { flex: 1; border: none; padding: 15px; outline: none; font-size: 16px; }
        .search-box button { background: var(--primary-blue); color: white; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }

        /* 2. 每日贴士卡片 */
        .tips-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 18px; margin-bottom: 20px; border-left: 5px solid var(--primary-blue); }
        .tips-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tips-title { font-size: 15px; font-weight: bold; }
        .tips-date { font-size: 11px; color: var(--primary-blue); font-weight: bold; }
        #tip-content { font-size: 13.5px; color: #555; line-height: 1.5; }

        /* 3. 核心：30天免费推广活动 */
        .promo-card { 
            background: linear-gradient(135deg, #fff9c4 0%, #fff176 100%); 
            border: 1px solid #fdd835; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 25px; 
            position: relative;
            box-shadow: 0 4px 10px rgba(253, 216, 53, 0.2);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }
        .promo-tag { background: #e65100; color: white; font-size: 10px; padding: 2px 8px; border-radius: 50px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
        .promo-title { font-size: 17px; font-weight: bold; color: #bf360c; margin-bottom: 5px; }
        .promo-desc { font-size: 13px; color: #5d4037; line-height: 1.5; }

        /* 列表与通用卡片 */
        .card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .info-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f1f1; text-decoration: none; color: #444; font-size: 14px; }
        
        /* 投稿表单 */
        #postForm { display: none; background: #fff; border: 2px solid var(--primary-blue); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .form-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .stats { text-align: center; margin-top: 40px; padding: 25px; background: #fafafa; border-radius: 15px; }
        footer { text-align: center; padding: 50px 20px; color: #bbb; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
    </header>

    <div class="content">
        <!-- 搜索工具 -->
        <div class="search-section">
            <form action="https://naver.com" method="get" target="_blank" class="search-box">
                <input type="text" name="query" placeholder="在NAVER中搜索实时汇率、天气、政策">
                <button type="submit">搜索</button>
            </form>
        </div>

        <!-- 每日生活贴士 (自动更新) -->
        <div class="tips-card">
            <div class="tips-header">
                <div class="tips-title">💡 每日生活贴士</div>
                <div id="current-date" class="tips-date"></div>
            </div>
            <div id="tip-content">正在加载今日精选内容...</div>
        </div>

        <!-- 30天免费推广活动 -->
        <div class="promo-card">
            <span class="promo-tag">限时活动</span>
            <div class="promo-title">🔥 商家免费推广计划</div>
            <div class="promo-desc">
                现在提交招聘信息，审核通过后即可获得 <br>
                <strong>首页置顶 30天</strong> 免费服务！助您快速招聘人才。
            </div>
            <button onclick="toggleForm()" style="margin-top:12px; background:#e65100; color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold; cursor:pointer; font-size:13px;">
                立即点击申请发布 >
            </button>
        </div>

        <!-- 发布招聘表单 (发送至 davidguksung@gmail.com) -->
        <div id="postForm">
            <h3 style="margin-top:0; font-size:17px; color:var(--primary-blue);">📝 提交招聘详情 (人工审核)</h3>
            <form action="https://formspree.io" method="POST">
                <input type="text" name="联系方式" required placeholder="您的联系电话 / 微信" class="form-input">
                <textarea name="详情" rows="5" required placeholder="请填写：招聘职位、工作地点、薪资待遇、工作时间等" class="form-input"></textarea>
                <button type="submit" class="post-btn" style="width:100%; border-radius:8px; height:45px;">确认提交审核</button>
            </form>
        </div>

        <!-- 实时资讯 -->
        <div class="card">
            <div class="card-title">🔔 最新资讯</div>
            <a href="https://naver.com?query=2026年最新签证政策" target="_blank" class="info-item">
                <span>签证: 2026年最新政策及 F-4 解读</span> <span style="color:#ccc;">↗</span>
            </a>
            <a href="https://naver.com?query=实时汇率" target="_blank" class="info-item">
                <span>汇率: 查看实时汇率详细图表</span> <span style="color:#ccc;">↗</span>
            </a>
        </div>

        <!-- 招聘公告栏 -->
        <div class="card">
            <div class="card-title">💼 最新职位公告</div>
            <div style="text-align: center; padding: 40px 0; color: #aaa; font-size: 14px;">
                目前还没有发布的公告<br>
                <span style="font-size: 12px; margin-top: 10px; display: block; color:#ccc;">点击上方“发布招聘”提交申请，审核后在此显示</span>
            </div>
        </div>

        <div class="stats">
            <div style="font-size: 11px; color: #999;">TOTAL VISITORS</div>
            <div style="font-size: 38px; font-weight: bold; color: var(--primary-blue);">923</div>
        </div>
    </div>

    <footer>© 2026 HanZhiTong. ALL RIGHTS RESERVED.</footer>
</div>

<script>
    // 1. 切换表单显示状态
    function toggleForm() {
        var form = document.getElementById('postForm');
        form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        if(form.style.display === 'block') form.scrollIntoView({behavior: "smooth"});
    }

    // 2. 自动日期与贴士更新逻辑
    function updateDailyTips() {
        const dateEl = document.getElementById('current-date');
        const contentEl = document.getElementById('tip-content');
        const now = new Date();
        dateEl.innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

        const tipsLibrary = [
            "建议通过正规银行APP换钱，避免因私人换钱导致银行账号被冻结的风险。",
            "在韩国丢失护照？请第一时间去附近派出所开具证明，并联系大使馆预约补办。",
            "房屋租赁合同到期前至少2个月告知房东续租意愿，否则可能默认自动续约。",
            "2026新规：部分服务行业已放宽F-4签证就业限制，请关注最新职业许可清单。",
            "职场遇到不公正待遇？拨打1350劳动部热线，支持多语种翻译和法律咨询。",
            "垃圾分类注意：食物垃圾务必装入专用黄色垃圾袋，乱丢会被处以高额罚款。"
        ];
        // 随机显示一条
        contentEl.innerHTML = tipsLibrary[Math.floor(Math.random() * tipsLibrary.length)];
    }
    updateDailyTips();
</script>

</body>
</html>
