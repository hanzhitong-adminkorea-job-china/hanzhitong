<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韩职通 - 专业的在韩华人招聘网</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f7f9; color: #333; line-height: 1.6; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 800; color: #007AFF; text-decoration: none; }
        .post-btn { background: #007AFF; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; }
        
        /* 공고 카드 스타일 */
        .job-list { padding: 15px; }
        .job-card { background: #fff; border: 1px solid #eee; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .job-card .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-bottom: 10px; background: #eef5ff; color: #007AFF; }
        .job-card .title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #111; }
        .job-card .info { font-size: 14px; color: #666; margin-bottom: 15px; }
        .job-card .contact-btn { display: block; width: 100%; padding: 12px; text-align: center; background: #007AFF; color: white; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; }

        .empty-state { padding: 60px 20px; text-align: center; color: #bbb; }
        footer { padding: 40px 20px; text-align: center; background: #fafbfc; border-top: 1px solid #eee; }
        
        #post-form { display: none; padding: 25px 20px; background: #f9fbff; border-bottom: 5px solid #eee; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
    </header>

    <section id="post-form">
        <div style="font-size:18px; font-weight:bold; margin-bottom:15px; color:#007AFF;">무료 구인 공고 신청</div>
        <form action="https://formspree.io" method="POST">
            <div class="form-group"><label>公司名称</label><input type="text" name="company" required></div>
            <div class="form-group"><label>职位名称</label><input type="text" name="job_title" required></div>
            <div class="form-group"><label>联系方式</label><input type="text" name="contact" required></div>
            <div class="form-group"><label>详细说明</label><textarea name="details" rows="4"></textarea></div>
            <button type="submit" class="submit-btn">제출하기 (검토 후 게시)</button>
        </form>
    </section>

    <!-- 메인 섹션 -->
    <div style="padding: 20px; text-align: center; background: #f9fbff;">
        <h2 style="font-size: 22px;">在韩华人, <span style="color:#007AFF;">高效就业</span></h2>
        <p style="font-size: 13px; color: #888; margin-top: 5px;">현재 무료 홍보 이벤트 진행 중!</p>
    </div>

    <div style="padding: 20px 20px 5px; font-weight: bold; font-size: 17px;">最新职位公告</div>

    <!-- 📌 공고 저장소 (여기에 공고 카드를 복사해서 넣으세요) -->
    <div class="job-list" id="job-container">
        
        <!-- [예시 공고 카드 시작] - 공고가 들어오면 이 부분을 복사해서 채우시면 됩니다 -->
        <!--
        <div class="job-card">
            <span class="badge">E-7 支援 · 今日新</span>
            <div class="title">○○무역 - 중국어 해외영업 채용</div>
            <div class="info">📍 서울 강남구 | 💰 연봉 3,500만+ | 📄 비자 지원</div>
            <a href="tel:010-0000-0000" class="contact-btn">📞 연락하기</a>
        </div>
        -->
        <!-- [예시 공고 카드 끝] -->

        <!-- 공고가 없을 때만 보이는 메시지 -->
        <div class="empty-state" id="no-jobs">
            <p>📝 아직 등록된 공고가 없습니다.</p>
            <p style="font-size: 12px; margin-top: 5px;">'+ 发布招聘' 버튼을 눌러 첫 공고를 신청하세요!</p>
        </div>
    </div>

    <footer>
        <div style="margin-bottom:15px;">
            <p style="font-size:10px; color:#aaa; font-weight:bold;">TOTAL VISITORS</p>
            <span id="visitor-count" style="font-size:24px; font-weight:900; color:#007AFF;">...</span>
        </div>
        <div style="font-size:11px; color:#bbb;">© 2024 HanZhiTong. ALL RIGHTS RESERVED.</div>
    </footer>
</div>

<script>
    function toggleForm() {
        const form = document.getElementById('post-form');
        form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        if(form.style.display === 'block') form.scrollIntoView({behavior: "smooth"});
    }

    // 방문자 카운터 (로컬 저장소 방식)
    function initCounter() {
        const el = document.getElementById('visitor-count');
        let count = localStorage.getItem('hzt_count_vfinal') || 10;
        count = parseInt(count) + 1;
        localStorage.setItem('hzt_count_vfinal', count);
        el.innerText = count.toLocaleString();
    }
    window.onload = initCounter;
</script>

</body>
</html>
