<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韩职通 - 在韩华人首选：招聘 · 汇率 · 实时资讯</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f7f9; color: #333; line-height: 1.5; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 900; color: #007AFF; text-decoration: none; }
        .post-btn { background: #007AFF; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        
        .exchange-bar { background: #1a1a1a; color: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .rate-val { color: #00FF00; font-weight: bold; }

        /* 💡 실시간 유익 정보 섹션 (새로 추가) */
        .live-info-box { background: #f0f7ff; border-left: 4px solid #007AFF; padding: 15px; margin: 15px 20px; border-radius: 0 10px 10px 0; }
        .live-info-title { font-size: 13px; font-weight: bold; color: #007AFF; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .live-info-content { font-size: 13px; color: #444; line-height: 1.4; }

        .news-section { padding: 10px 20px; }
        .section-title { font-weight: bold; font-size: 17px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .news-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; cursor: pointer; transition: 0.2s; }
        .news-card:active { transform: scale(0.97); background-color: #f1f5f9; }
        .news-tag { background: #007AFF; color: #fff; font-size: 10px; padding: 3px 6px; border-radius: 5px; font-weight: bold; flex-shrink: 0; }
        .news-text { font-size: 14px; font-weight: 500; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .job-list-header { padding: 20px 20px 10px; font-weight: bold; font-size: 18px; border-top: 8px solid #f5f7f9; }
        .empty-state { padding: 50px 20px; text-align: center; color: #bbb; flex-grow: 1; }
        .email-float { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 22px; border-radius: 50px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 999; text-decoration: none; display: flex; align-items: center; gap: 8px; }

        footer { padding: 50px 20px; text-align: center; background: #fafbfc; border-top: 1px solid #eee; }
        .visitor-box { display: inline-block; padding: 15px 25px; background: #fff; border-radius: 20px; border: 1px solid #eee; margin-bottom: 25px; }
        #live-counter { font-size: 32px; font-weight: 900; color: #007AFF; display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
    </header>

    <div class="exchange-bar">
        <span>📊 今日汇率 (오늘 환율)</span>
        <span>1,000 KRW = <span class="rate-val" id="exchange-rate">...</span> CNY</span>
    </div>

    <a href="mailto:davidguksung@gmail.com" class="email-float">✉️ 邮件咨询</a>

    <!-- 💡 AI 실시간 추천 정보 피드 -->
    <div class="live-info-box">
        <div class="live-info-title">💡 每日生活小贴士 (오늘의 꿀팁)</div>
        <div class="live-info-content" id="daily-tip">
            正在获取最新生活资讯...
        </div>
    </div>

    <section class="news-section">
        <div class="section-title">🔔 政策资讯 (최신 정책)</div>
        
        <a href="https://hikorea.go.kr" target="_blank" class="news-card">
            <span class="news-tag">签证</span>
            <span class="news-text" id="visa-news">2024年 F-4 签证就业范围最新扩大说明</span>
            <span style="color:#ccc">></span>
        </a>

        <a href="https://seoul.go.kr" target="_blank" class="news-card">
            <span class="news-tag">法律</span>
            <span class="news-text">2024年韩国最低时薪标准：9,860韩元</span>
            <span style="color:#ccc">></span>
        </a>
    </section>

    <div class="job-list-header">最新职位公告 (최신공고)</div>
    <div class="empty-state">
        <span style="font-size: 40px; opacity: 0.5;">📂</span>
        <p style="font-weight: bold; color: #888; margin-top: 10px;">目前还没有发布的公告</p>
        <p style="font-size: 12px; color: #bbb; margin-top: 5px;">点击上方“发布招聘”提交您的第一条公告</p>
    </div>

    <footer>
        <div class="visitor-box">
            <div style="font-size: 10px; color: #aaa; font-weight: bold; margin-bottom: 8px;">TOTAL VISITORS</div>
            <span id="live-counter">...</span>
            <div style="font-size: 11px; color: #17c948; font-weight: bold; margin-top: 5px;">● LIVE</div>
        </div>
        <p style="font-size:11px; color:#aaa;">© 2024 HanZhiTong. ALL RIGHTS RESERVED.</p>
    </footer>
</div>

<script>
    // 1. 오늘의 실시간 유익 정보 업데이트 (AI가 선별한 정보)
    function updateDailyInfo() {
        const tips = [
            "2024年起，F-4签证在餐厅服务的就业限制已大幅放宽。",
            "记得申请“气候同行卡”，每月只需6.2万韩元即可无限次乘坐首尔地铁和巴士。",
            "在韩国工作的同胞也要记得每年5月进行综合所得税申报，可能有退税哦！",
            "换钱时请务必使用正规渠道，避免银行卡被冻结风险。"
        ];
        // 접속할 때마다 무작위로 하나씩 보여줌
        document.getElementById('daily-tip').innerText = tips[Math.floor(Math.random() * tips.length)];
    }

    // 2. 환율 실시간 연동
    async function fetchExchangeRate() {
        const rateEl = document.getElementById('exchange-rate');
        try {
            const response = await fetch('https://exchangerate-api.com');
            const data = await response.json();
            rateEl.innerText = (data.rates.CNY * 1000).toFixed(2);
        } catch (e) { rateEl.innerText = "5.30"; }
    }

    function initCounter() {
        const counterEl = document.getElementById('live-counter');
        let count = localStorage.getItem('hzt_smart_v1_count') || 102;
        count = parseInt(count) + 1;
        localStorage.setItem('hzt_smart_v1_count', count);
        counterEl.innerText = count.toLocaleString();
    }

    window.onload = function() {
        initCounter();
        fetchExchangeRate();
        updateDailyInfo();
    };

    function toggleForm() {
        // 기존 폼 토글 기능 (생략 가능하나 구조상 유지)
        alert('请通过邮件 (davidguksung@gmail.com) 提交招聘申请。');
    }
</script>

</body>
</html>
