<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韩职通 - 专业的在韩华人招聘网</title>
    <style>
        /* 눈이 편안한 모바일 최적화 스타일 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f7f9; color: #333; line-height: 1.6; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* 헤더 */
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 800; color: #007AFF; text-decoration: none; }
        .post-btn { background: #007AFF; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        
        /* 히어로 섹션 */
        .hero { padding: 40px 20px; background: linear-gradient(180deg, #f9fbff 0%, #fff 100%); text-align: center; }
        .hero h2 { font-size: 24px; margin-bottom: 10px; color: #111; }
        .hero p { color: #888; font-size: 14px; margin-bottom: 25px; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; font-size: 16px; outline: none; }

        /* 채용 등록 폼 (Formspree) */
        #post-form { display: none; padding: 25px 20px; background: #f9fbff; border-bottom: 5px solid #eee; }
        .form-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #007AFF; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* 공고 목록 */
        .section-header { padding: 20px 20px 10px; font-weight: bold; font-size: 18px; border-bottom: 1px solid #f0f0f0; }
        
        /* 공고 카드 디자인 (유료화 대비 버전) */
        .job-card { padding: 20px; border-bottom: 1px solid #eee; position: relative; }
        .job-card:last-child { border-bottom: none; }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .d-day { background: #FF3B30; color: white; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 4px; }
        .job-title { font-size: 18px; font-weight: bold; color: #111; margin-bottom: 5px; }
        .job-desc { font-size: 14px; color: #666; margin-bottom: 15px; }
        .contact-link { display: block; text-align: center; background: #007AFF; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; }

        /* 푸터 및 카운터 */
        footer { padding: 60px 20px; text-align: center; background: #fafbfc; border-top: 1px solid #eee; margin-top: auto; }
        .visitor-box { display: inline-block; padding: 20px 30px; background: #fff; border-radius: 25px; border: 1px solid #eee; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .visitor-label { font-size: 11px; color: #aaa; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; }
        #live-counter { font-size: 32px; font-weight: 900; color: #007AFF; display: block; margin: 5px 0; }
        .live-status { font-size: 11px; color: #17c948; margin-top: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: #17c948; border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
    </header>

    <!-- 채용 등록 폼 -->
    <section id="post-form">
        <div class="form-title">무료 구인 공고 등록</div>
        <form action="https://formspree.io" method="POST">
            <div class="form-group">
                <label>公司/店铺名称 (업체명)</label>
                <input type="text" name="company" required placeholder="예: ○○무역">
            </div>
            <div class="form-group">
                <label>职位名称 (구인직종)</label>
                <input type="text" name="job_title" required placeholder="예: 주방장 / 사무직">
            </div>
            <div class="form-group">
                <label>联系方式 (연락처)</label>
                <input type="text" name="contact" required placeholder="010-0000-0000">
            </div>
            <div class="form-group">
                <label>详细说明 (상세내용)</label>
                <textarea name="details" rows="4" placeholder="비자 요구사항, 급여 등 상세 내용을 적어주세요."></textarea>
            </div>
            <button type="submit" class="submit-btn">신청하기</button>
        </form>
    </section>

    <!-- 메인 섹션 -->
    <section class="hero">
        <h2>在韩华人, <span style="color:#007AFF;">高效就业</span></h2>
        <p>무료 등록 이벤트 중! 지금 바로 공고를 올려보세요.</p>
        <input type="text" class="search-box" placeholder="搜索您感兴趣的职位...">
    </section>

    <div class="section-header">最新职位公告 (최신공고)</div>

    <!-- 첫 번째 공고 샘플 (유료화 대비 디자인) -->
    <div class="job-card">
        <div class="card-top">
            <span class="d-day">D-15 (급구)</span>
            <span style="font-size: 11px; color: #bbb;">今日 14:30</span>
        </div>
        <div class="job-title">[서울/강남] IT무역회사 중국어 영업 담당자</div>
        <div class="job-desc">📍 서울 강남구 | 💰 연봉 3,000만~ | 📄 비자 지원가능</div>
        <a href="tel:010-1234-5678" class="contact-link">📞 바로 전화문의</a>
    </div>

    <footer>
        <div class="visitor-box">
            <div class="visitor-label">TOTAL VISITORS</div>
            <!-- 실시간 누적 카운터 -->
            <span id="live-counter">...</span>
            <div class="live-status">
                <span class="dot"></span> 시스템 정상 작동중 (LIVE)
            </div>
        </div>
        <div style="font-weight:bold; color:#444; margin-bottom:5px;">韩职通 HanZhiTong</div>
        <p style="font-size:11px; color:#aaa;">© 2024 HanZhiTong. ALL RIGHTS RESERVED.</p>
    </footer>
</div>

<script>
    // 폼 보이기/숨기기
    function toggleForm() {
        const form = document.getElementById('post-form');
        const isHidden = (form.style.display === 'none' || form.style.display === '');
        form.style.display = isHidden ? 'block' : 'none';
        if(isHidden) form.scrollIntoView({ behavior: 'smooth' });
    }

    // 외부 이미지 없이 정직하게 숫자가 올라가는 카운터 기능
    function initCounter() {
        const counterEl = document.getElementById('live-counter');
        // 브라우저 로컬 저장소를 활용해 사장님의 방문 횟수를 정직하게 기록
        let count = localStorage.getItem('hzt_visitor_count') || 12; // 12명부터 시작(예시)
        count = parseInt(count) + 1;
        localStorage.setItem('hzt_visitor_count', count);
        counterEl.innerText = count.toLocaleString();
    }

    window.onload = initCounter;
</script>

</body>
</html>
