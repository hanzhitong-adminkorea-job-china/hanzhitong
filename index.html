<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 HanZhiTong - 综合生活平台</title>
    <style>
        :root { --primary-blue: #007bff; --bg-gray: #f4f7f6; --naver-green: #03c75a; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #f1f1f1; }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary-blue); text-decoration: none; }
        .post-btn { background: var(--primary-blue); color: white; border: none; padding: 10px 18px; border-radius: 25px; font-size: 13px; cursor: pointer; font-weight: bold; }

        .content { padding: 15px; }

        /* 管理员联系方式 */
        .admin-contact { background: #fff; border: 1px dotted #ccc; border-radius: 10px; padding: 10px; margin-bottom: 20px; text-align: center; font-size: 12px; color: #888; }

        /* 顶部搜索框 */
        .top-search { margin-bottom: 20px; }
        .search-inner { display: flex; background: #f1f3f5; border-radius: 12px; padding: 5px 15px; align-items: center; }
        .search-inner input { flex: 1; border: none; background: none; padding: 10px; outline: none; font-size: 14px; }
        .search-inner button { border: none; background: none; cursor: pointer; font-size: 18px; }

        /* 分类菜单 */
        .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .category-item { text-align: center; cursor: pointer; text-decoration: none; color: inherit; }
        .category-icon { width: 50px; height: 50px; background: #eef5ff; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 24px; transition: 0.2s; }
        .category-item:hover .category-icon { background: var(--primary-blue); color: white; transform: translateY(-3px); }
        .category-text { font-size: 12px; font-weight: bold; }

        /* 自动滚动贴士 */
        .tips-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--primary-blue); min-height: 50px; }
        #tip-content { font-size: 13.5px; color: #444; line-height: 1.6; transition: opacity 0.5s; }
        .kor-txt { color: #d32f2f; font-weight: bold; }

        /* 推广横幅 */
        .promo-banner { background: linear-gradient(135deg, #fffde7 0%, #fff59d 100%); border: 1px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .promo-info h4 { margin: 0 0 5px; color: #f57f17; font-size: 15px; }
        .promo-info p { margin: 0; font-size: 12px; color: #7f6d00; }

        /* 实用工具网格 */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .tool-item { display: flex; align-items: center; padding: 12px; background: #fafafa; border-radius: 10px; text-decoration: none; color: #555; font-size: 13px; border: 1px solid #f1f1f1; }
        .tool-item:hover { background: #f0f7ff; border-color: var(--primary-blue); }

        /* 发布表单 */
        #postForm { display: none; background: #fff; border: 2px solid var(--primary-blue); border-radius: 15px; padding: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        /* 页脚 */
        footer { text-align: center; padding: 40px 20px; background: #fafafa; color: #bbb; font-size: 11px; border-top: 1px solid #eee; }
        .footer-slogan { color: var(--primary-blue); font-weight: bold; margin-bottom: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布信息</button>
    </header>

    <div class="content">
        <!-- 管理员信息 -->
        <div class="admin-contact">
            如有疑问或商务合作，请联络管理员：<br>
            <a href="mailto:davidguksung@gmail.com" style="color:var(--primary-blue); text-decoration:none; font-weight:bold;">✉ davidguksung@gmail.com</a>
        </div>

        <!-- 顶部搜索 -->
        <div class="top-search">
            <form action="https://search.naver.com/search.naver" method="get" target="_blank" class="search-inner">
                <button type="submit">🔍</button>
                <input type="text" name="query" placeholder="在NAVER查汇率、天气、快递...">
            </form>
        </div>

        <!-- 分类菜单 -->
        <div class="category-grid">
            <div class="category-item" onclick="toggleForm()">
                <div class="category-icon">💼</div><div class="category-text">招聘求职</div>
            </div>
            <div class="category-item" onclick="toggleForm()">
                <div class="category-icon">🛒</div><div class="category-text">闲置二手</div>
            </div>
            <div class="category-item" onclick="toggleForm()">
                <div class="category-icon">🏠</div><div class="category-text">房屋租赁</div>
            </div>
            <div class="category-item" onclick="toggleForm()">
                <div class="category-icon">💬</div><div class="category-text">生活互助</div>
            </div>
        </div>

        <!-- 滚动贴士 -->
        <div class="tips-card">
            <div id="tip-content">正在为您加载生活小贴士...</div>
        </div>

        <!-- 推广横幅 -->
        <div class="promo-banner" onclick="toggleForm()">
            <div style="font-size: 30px;">🎁</div>
            <div class="promo-info">
                <h4>商家入驻限时优惠</h4>
                <p>发布招聘或租房信息，立享 **30天首页置顶** 权益！</p>
            </div>
        </div>

        <!-- 发布表单 -->
        <div id="postForm">
            <h3 style="margin-top:0; font-size:17px; color:var(--primary-blue);">📝 提交发布申请</h3>
            <form action="https://formspree.io" method="POST">
                <input type="hidden" name="_next" value="https://vercel.app">
                <select name="类别" class="form-input" required>
                    <option value="" disabled selected>选择信息分类</option>
                    <option value="招聘">💼 招聘求职</option>
                    <option value="二手">🛒 闲置二手</option>
                    <option value="租房">🏠 房屋租赁</option>
                    <option value="互助">💬 生活互助</option>
                </select>
                <input type="text" name="联系方式" required placeholder="您的电话或微信号" class="form-input">
                <textarea name="详细内容" rows="5" required placeholder="请输入详细描述（地点、价格、具体要求等）" class="form-input"></textarea>
                <button type="submit" class="post-btn" style="width:100%; border-radius:8px; height:45px;">确认提交审核</button>
            </form>
        </div>

        <!-- 💡 实用工具 (已更新为您提供的全部 5 个最新链接) -->
        <div style="background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 18px; margin-bottom: 20px;">
            <div style="font-size: 16px; font-weight: bold; color: #222; margin-bottom: 15px; border-bottom: 2px solid #f8f9fa; padding-bottom: 8px;">🔔 实用生活工具</div>
            <div class="tool-grid">
                <!-- 1. 【更新】汇率链接 -->
                <a href="https://naver.com" target="_blank" class="tool-item">📊 实时汇率查询</a>
                
                <!-- 2. 【更新】物流链接 -->
                <a href="https://search.naver.com/search.naver?sm=tab_hty.top&where=nexearch&ssc=tab.nx.all&query=%ED%83%9D%EB%B0%B0%EC%A1%B0%ED%9A%8C&oquery=%EB%82%A0%EC%94%A8&tqi=jQO42wqVW9hssfPhtQh-395208&ackey=gjfa1gts" target="_blank" class="tool-item">📦 物流快递查询</a>
                
                <!-- 3. 【更新】天气链接 -->
                <a href="https://search.naver.com/search.naver?where=nexearch&sm=top_hty&fbm=0&ie=utf8&query=%EB%82%A0%EC%94%A8&ackey=hat38b7u" target="_blank" class="tool-item">🌤️ 韩国实时天气</a>
                
                <!-- 4. 【锁定】公休日链接 -->
                <a href="https://naver.com" target="_blank" class="tool-item">📅 26年公休日查询</a>
                
                <!-- 5. 【锁定】地图链接 -->
                <a href="https://map.naver.com/" target="_blank" class="tool-item" style="grid-column: span 2; justify-content: center; background: var(--naver-green); color: #fff; font-weight: bold; border:none;">🗺️ Naver 地图官网 ↗</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-slogan">懂招聘，更懂在韩生活的你</div>
        韩职通已累计为 923 位在韩华人提供服务<br>
        © 2026 HanZhiTong. ALL RIGHTS RESERVED.
    </footer>
</div>

<script>
    function toggleForm() {
        var form = document.getElementById('postForm');
        form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        if(form.style.display === 'block') form.scrollIntoView({behavior: "smooth"});
    }

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('thanks') === 'true') {
            alert('✅ 提交成功！管理员将尽快进行审核。感谢您的发布！');
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    const tips = [
        "💡 租房必看：签约前务必确认 <span class='kor-txt'>등기부등본</span> (登记簿副本)，检查房东身份和房屋债务。",
        "💡 换钱安全：建议通过官方银行APP换钱，避免私人交易导致 <span class='kor-txt'>계좌정지</span> (账户冻结) 风险。",
        "💡 签证政策：F-4签证在某些服务业就业受限，请在 <span class='kor-txt'>하이코리아</span> (Hi Korea) 官网核对职业清单。",
        "💡 法律维权：职场纠纷可拨打1350咨询 <span class='kor-txt'>고용노동부</span> (雇佣劳动部)，支持中文人工翻译。",
        "💡 生活提示：丢弃冰箱、沙发等大件垃圾需购买 <span class='kor-txt'>대형폐기물 스티커</span> (大件垃圾排放贴纸)。"
    ];
    let tipIdx = 0;
    function rotateTips() {
        const el = document.getElementById('tip-content');
        el.style.opacity = 0;
        setTimeout(() => {
            el.innerHTML = tips[tipIdx];
            el.style.opacity = 1;
            tipIdx = (tipIdx + 1) % tips.length;
        }, 500);
    }
    setInterval(rotateTips, 5000);
    rotateTips();
</script>

</body>
</html>
