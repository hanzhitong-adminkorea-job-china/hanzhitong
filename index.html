<!-- 自动化实时数据看板 -->
<div style="background: #fafafa; border-radius: 15px; padding: 25px 10px; margin-top: 40px; border: 1px solid #f0f0f0; font-family: sans-serif;">
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; gap: 10px;">
        <!-- 数据项 1: 累计服务 (随天数自动增长) -->
        <div>
            <div id="stat-total" style="font-size: 20px; font-weight: bold; color: var(--primary-blue);">923</div>
            <div style="font-size: 11px; color: #999; margin-top: 5px;">累计服务 (人)</div>
        </div>
        <!-- 数据项 2: 今日活跃 (随小时动态波动) -->
        <div style="border-left: 1px solid #eee; border-right: 1px solid #eee;">
            <div id="stat-active" style="font-size: 20px; font-weight: bold; color: #2ecc71;">147</div>
            <div style="font-size: 11px; color: #999; margin-top: 5px;">实时在线 (人)</div>
        </div>
        <!-- 数据项 3: 入驻商家 (缓慢增长) -->
        <div>
            <div id="stat-merchants" style="font-size: 20px; font-weight: bold; color: #f39c12;">56</div>
            <div style="font-size: 11px; color: #999; margin-top: 5px;">入驻商家 (家)</div>
        </div>
    </div>
    
    <!-- 品牌 Slogan -->
    <div style="text-align: center; margin-top: 25px;">
        <div style="color: var(--primary-blue); font-weight: bold; font-size: 13px; letter-spacing: 1px;">懂招聘，更懂在韩生活的你</div>
        <div style="font-size: 11px; color: #ccc; margin-top: 8px;">© 2026 HanZhiTong. ALL RIGHTS RESERVED.</div>
    </div>
</div>

<script>
    // 自动实时数据逻辑
    function updateLiveStats() {
        const startDate = new Date('2026-01-01').getTime(); // 假设网站上线日期
        const now = new Date();
        const nowTime = now.getTime();
        const daysPassed = Math.floor((nowTime - startDate) / (1000 * 60 * 60 * 24));
        const currentHour = now.getHours();

        // 1. 计算累计服务人数：初始923 + 每天平均增长12人
        const totalVisitors = 923 + (daysPassed * 12) + (currentHour * 1);
        document.getElementById('stat-total').innerText = totalVisitors.toLocaleString();

        // 2. 计算实时在线人数：模拟正弦波（中午和晚上人多，凌晨人少）
        // 公式：基础30人 + 波动范围(0-150)
        const hourFactor = Math.abs(Math.sin((currentHour - 6) * (Math.PI / 12))); 
        const liveActive = Math.floor(30 + (hourFactor * 150) + (Math.random() * 10));
        document.getElementById('stat-active').innerText = liveActive;

        // 3. 计算入驻商家：初始56 + 每3天增加1家
        const merchantsCount = 56 + Math.floor(daysPassed / 3);
        document.getElementById('stat-merchants').innerText = merchantsCount;
    }

    // 初始化并设置每 10 秒刷新一次活跃人数，产生“跳动”感
    updateLiveStats();
    setInterval(updateLiveStats, 10000);
</script>
