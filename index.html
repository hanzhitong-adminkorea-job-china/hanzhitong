<!-- 한직통 정보 섹션 시작 -->
<div style="max-width: 500px; margin: 0 auto; padding: 10px; font-family: 'Noto Sans KR', sans-serif;">

    <!-- 1. 실시간 환율 바 (클릭 시 네이버 환율로 이동) -->
    <div onclick="window.open('https://naver.com', '_blank')" 
         style="background: #222; color: #fff; padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 12px; font-size: 14px;">
        <div>📊 <span style="color: #ccc; margin-left: 5px;">실시간 환율:</span> <strong>1,000 KRW = 5.21 CNY</strong></div>
        <div style="font-size: 12px; color: #aaa;">NAVER 이동 ></div>
    </div>

    <!-- 2. 통합 검색창 (날씨 및 정보 검색) -->
    <div style="background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px;">
        <h3 style="font-size: 15px; margin-top: 0; margin-bottom: 10px; color: #333;">🔍 무엇이든 검색해보세요</h3>
        <form action="https://naver.com" method="get" target="_blank" style="display: flex; border: 2px solid #007bff; border-radius: 6px; overflow: hidden;">
            <input type="text" name="query" placeholder="서울 날씨, 비자 정책 등 입력" 
                   style="flex: 1; border: none; padding: 10px; outline: none; font-size: 14px;">
            <button type="submit" style="background: #007bff; color: white; border: none; padding: 0 15px; cursor: pointer; font-weight: bold;">검색</button>
        </form>
    </div>

    <!-- 3. 날씨 및 환율 퀵 메뉴 (날씨 위젯 대체) -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
        <!-- 네이버 날씨 바로가기 -->
        <a href="https://naver.com?query=%EB%82%A0%EC%94%A8" target="_blank" 
           style="text-decoration: none; background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; text-align: center; color: #333; font-size: 14px; display: flex; flex-direction: column; align-items: center;">
            <span style="font-size: 20px; margin-bottom: 5px;">🌤️</span>
            <strong>실시간 날씨</strong>
            <span style="font-size: 11px; color: #888; margin-top: 3px;">네이버 예보 확인</span>
        </a>
        <!-- 네이버 환율 상세정보 -->
        <a href="https://naver.com?query=%EB%84%A4%EC%9D%B4%EB%B2%84+%ED%99%98%EC%9C%A8" target="_blank" 
           style="text-decoration: none; background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; text-align: center; color: #333; font-size: 14px; display: flex; flex-direction: column; align-items: center;">
            <span style="font-size: 20px; margin-bottom: 5px;">📈</span>
            <strong>환율 차트</strong>
            <span style="font-size: 11px; color: #888; margin-top: 3px;">실시간 상세분석</span>
        </a>
    </div>

</div>
<!-- 한직통 정보 섹션 끝 -->
