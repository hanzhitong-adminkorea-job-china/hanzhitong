<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 - 专业的在韩华人招聘网</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f7f9; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; color: #007AFF; }
        
        /* 버튼 스타일 */
        .post-btn { background: #007AFF; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 12px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; }
        .hero { padding: 30px 20px; background: #f9fbff; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-top: 15px; font-size: 15px; }
        
        /* 채용 공고 폼 스타일 (기본은 숨김) */
        #post-form { display: none; padding: 20px; background: #fff; border-bottom: 8px solid #f5f7f9; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .submit-btn { width: 100%; padding: 14px; background: #007AFF; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .section-title { padding: 20px 20px 10px; font-weight: bold; font-size: 17px; }
        .job-card { padding: 20px; border-bottom: 6px solid #f5f7f9; }
        .badge { display: inline-block; padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 10px; background: #eef5ff; color: #007AFF; }
        .job-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .job-info { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.8; }
        .contact-link { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 14px; background: #007AFF; color: #fff; border-radius: 12px; text-decoration: none; font-weight: bold; }
        
        footer { padding: 40px 20px; text-align: center; color: #aaa; font-size: 12px; }
        .visitor-badge { margin-bottom: 15px; display: inline-block; padding: 10px; background: #fafafa; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">韩职通 HanZhiTong</div>
            <!-- 버튼 클릭 시 폼 보이기 -->
            <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
        </header>

        <!-- 채용 등록 폼 (Formspree 연동) -->
        <section id="post-form">
            <h3 style="margin-bottom: 15px;">发布新招聘</h3>
            <form action="https://formspree.io" method="POST">
                <div class="form-group">
                    <label>公司名称 / 店铺名称</label>
                    <input type="text" name="company" required placeholder="예: 贸易公司">
                </div>
                <div class="form-group">
                    <label>职位名称</label>
                    <input type="text" name="job_title" required placeholder="예: 中文海外市场运营专员">
                </div>
                <div class="form-group">
                    <label>联系方式 (电话/微信)</label>
                    <input type="text" name="contact" required placeholder="예: 010-1234-5678">
                </div>
                <div class="form-group">
                    <label>详细说明 (薪资/签证要求等)</label>
                    <textarea name="description" rows="4" placeholder="예: 月薪 300万, F-4 优先"></textarea>
                </div>
                <button type="submit" class="submit-btn">提交申请</button>
            </form>
        </section>

        <section class="hero">
            <h2>在韩华人, <span style="color:#007AFF;">高效就业</span></h2>
            <p style="color:#888; font-size:14px;">直接联系，无需等待</p>
            <input type="text" class="search-box" placeholder="搜索职位...">
        </section>

        <div class="section-title">最新职位公告</div>

        <!-- 공고 샘플 -->
        <div class="job-card">
            <span class="badge">E-7 支援 · 今日新</span>
            <div class="job-title">贸易公司 - 中文海外 market 运营专员</div>
            <div class="job-info">
                📍 首尔 江南区<br>
                💰 月薪 300万 - 400만<br>
                📄 F-4, F-5, F-6 优先
            </div>
            <a href="tel:010-1234-5678" class="contact-link" onclick="handleContact(event, '010-1234-5678')">
                <span>📞 立即联系 (金经理)</span>
                <span style="font-size:11px; font-weight:normal; opacity:0.9;">010-1234-5678 (点击拨打)</span>
            </a>
        </div>

        <footer>
            <div class="visitor-badge">
                <div style="margin-bottom:5px; font-size:10px;">TOTAL VISITORS</div>
                <img src="https://seeyoufarm.com" alt="Visitors">
            </div>
            <p>© 2024 HanZhiTong. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <script>
        // 폼 보이기/숨기기 토글
        function toggleForm() {
            const form = document.getElementById('post-form');
            form.style.display = (form.style.display === 'block') ? 'none' : 'block';
            if(form.style.display === 'block') form.scrollIntoView({behavior: "smooth"});
        }

        // PC에서의 전화 버튼 클릭 처리
        function handleContact(event, phone) {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) {
                event.preventDefault();
                alert('联系电话: ' + phone + '\n请在手机上拨打此号码。');
            }
        }
    </script>
</body>
</html>
