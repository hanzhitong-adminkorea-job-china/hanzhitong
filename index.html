<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 HanZhiTong</title>
    <style>
        :root { --primary-blue: #007bff; --bg-gray: #f8f9fa; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        
        /* 导航栏 */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary-blue); text-decoration: none; }
        .post-btn { background: var(--primary-blue); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-size: 14px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        /* 内容区 */
        .content { padding: 20px; }

        /* 搜索框 */
        .search-section { margin-bottom: 30px; }
        .search-box { display: flex; border: 2px solid var(--primary-blue); border-radius: 12px; overflow: hidden; background: #fff; }
        .search-box input { flex: 1; border: none; padding: 15px; outline: none; font-size: 16px; }
        .search-box button { background: var(--primary-blue); color: white; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }

        /* 发布招聘表单 (默认隐藏) */
        #postForm { display: none; background: #fff; border: 2px solid #eee; border-radius: 15px; padding: 20px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .submit-btn { width: 100%; background: var(--primary-blue); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 5px; }

        /* 咨询卡片 */
        .contact-group { margin-bottom: 25px; }
        .contact-btn { display: block; width: 100%; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: bold; border: 1px solid #eee; background: #f8f9fa; color: #333; transition: 0.2s; }
        .contact-btn:hover { background: #f0f0f0; }

        /* 通用卡片与列表 */
        .card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #222; }
        .info-item { display: flex; align-items: center; gap: 12px; padding: 15px 0; border-bottom: 1px solid #f1f1f1; text-decoration: none; color: #444; font-size: 14px; cursor: pointer; }
        .info-item:last-child { border-bottom: none; }
        .badge { background: #e7f3ff; color: var(--primary-blue); padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }

        .stats { text-align: center; margin-top: 40px; padding: 25px; background: #fafafa; border-radius: 15px; }
        footer { text-align: center; padding: 50px 20px; color: #bbb; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/" class="logo">韩职通 HanZhiTong</a>
        <button class="post-btn" onclick="toggleForm()">+ 发布招聘</button>
    </header>

    <div class="content">
        <!-- 搜索区域 -->
        <div class="search-section">
            <form action="https://naver.com" method="get" target="_blank" class="search-box">
                <input type="text" name="query" placeholder="搜索: 首尔天气、汇率、签证等">
                <button type="submit">搜索</button>
            </form>
        </div>

        <!-- 投稿表单 (提交至您的邮箱) -->
        <div id="postForm">
            <h3 style="margin-top:0; font-size:17px; color:var(--primary-blue);">📝 提交招聘信息</h3>
            <p style="font-size:12px; color:#888; margin-bottom:15px;">提交后管理员将进行审核，审核通过后正式发布。</p>
            <form action="https://formspree.io" method="POST">
                <div class="form-group">
                    <label>联系方式 (手机号或邮箱)</label>
                    <input type="text" name="联系方式" required placeholder="方便管理员联系您">
                </div>
                <div class="form-group">
                    <label>招聘详情</label>
                    <textarea name="详情" rows="5" required placeholder="请填写：工作地点、薪资要求、工作内容等"></textarea>
                </div>
                <button type="submit" class="submit-btn">确认提交申请</button>
                <button type="button" onclick="toggleForm()" style="width:100%; background:none; border:none; color:#aaa; margin-top:12px; cursor:pointer; font-size:13px;">关闭</button>
            </form>
        </div>

        <div class="contact-group">
            <a href="mailto:davidguksung@gmail.com" class="contact-btn">✉️ 邮件咨询 (Email Us)</a>
        </div>

        <div class="card">
            <div class="card-title">💡 每日生活小贴士</div>
            <p style="font-size: 14px; color: #555; margin: 0; line-height:1.6;">建议通过正规银行APP换钱，避免账号被冻结风险。实时汇率请通过上方搜索框查询。</p>
        </div>

        <!-- 最新资讯 (修复点击跳转) -->
        <div class="card">
            <div class="card-title">🔔 最新资讯 (최신 소식)</div>
            <div class="info-item" onclick="window.open('https://naver.com?query=2026年最新签证政策及F-4解读', '_blank')">
                <span class="badge">签证</span> 2026年最新签证政策及 F-4 解读
            </div>
            <div class="info-item" onclick="window.open('https://naver.com?query=韩币兑换人民币汇率', '_blank')">
                <span class="badge">汇率</span> 查看NAVER实时汇率详细图表
            </div>
        </div>

        <!-- 职位公告栏 -->
        <div class="card">
            <div class="card-title">最新职位公告 (오늘 업데이트)</div>
            <div style="text-align: center; padding: 45px 0; color: #aaa; font-size: 14px;">
                目前还没有发布的公告<br>
                <span style="font-size: 12px; margin-top: 10px; display: block; color:#ccc;">点击上方“发布招聘”提交申请，审核后在此显示</span>
            </div>
        </div>

        <div class="stats">
            <div style="font-size: 11px; color: #999;">TOTAL VISITORS</div>
            <div style="font-size: 38px; font-weight: bold; color: var(--primary-blue);">923</div>
        </div>
    </div>

    <footer>© 2026 HanZhiTong. ALL RIGHTS RESERVED.</footer>
</div>

<script>
    // 控制表单显示与隐藏
    function toggleForm() {
        var form = document.getElementById('postForm');
        if (form.style.display === 'block') {
            form.style.display = 'none';
        } else {
            form.style.display = 'block';
            form.scrollIntoView({behavior: "smooth"});
        }
    }

    // 表单提交成功后的提示 (Formspree 默认会跳转，这是备选处理)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('thanks') === 'true') {
        alert('您的申请已提交成功，请耐心等待管理员审核！');
    }
</script>

</body>
</html>
