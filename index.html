<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 - 专业的在韩华人招聘网</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f5f7f9; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; }
        header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; color: #007AFF; }
        .post-btn { background: #007AFF; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 12px; text-decoration: none; font-weight: bold; }
        .hero { padding: 30px 20px; background: #f9fbff; }
        .hero h2 { font-size: 22px; margin-bottom: 5px; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-top: 15px; font-size: 15px; }
        .section-title { padding: 20px 20px 10px; font-weight: bold; font-size: 17px; }
        .job-card { padding: 20px; border-bottom: 6px solid #f5f7f9; }
        .badge { display: inline-block; padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 10px; background: #eef5ff; color: #007AFF; }
        .job-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .job-info { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.8; }
        
        /* 버튼 스타일 업그레이드 */
        .contact-link { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            padding: 14px; 
            background: #007AFF; /* 눈에 띄게 파란색으로 변경 */
            color: #fff; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .contact-link:active { background: #0056b3; transform: scale(0.98); }
        .contact-subtext { font-size: 11px; font-weight: normal; opacity: 0.9; margin-top: 2px; }

        footer { padding: 40px 20px; text-align: center; color: #aaa; font-size: 12px; }
        .visitor-badge { margin-bottom: 15px; display: inline-block; padding: 10px; background: #fafafa; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">韩职通 HanZhiTong</div>
            <a href="#" class="post-btn">+ 发布招聘</a>
        </header>

        <section class="hero">
            <h2>在韩华人, <span style="color:#007AFF;">高效就业</span></h2>
            <p style="color:#888; font-size:14px;">直接联系，无需等待</p>
            <input type="text" class="search-box" placeholder="搜索职位...">
        </section>

        <div class="section-title">最新职位公告</div>

        <div class="job-card">
            <span class="badge">E-7 支援 · 今日新</span>
            <div class="job-title">贸易公司 - 中文海外 market 运营专员</div>
            <div class="job-info">
                📍 首尔 江南区<br>
                💰 月薪 300万 - 400万<br>
                📄 F-4, F-5, F-6 优先
            </div>
            <!-- 버튼 클릭 시 확실한 반응을 위해 배경색과 서브텍스트 추가 -->
            <a href="tel:010-1234-5678" class="contact-link">
                <span>📞 立即联系 (金经理)</span>
                <span class="contact-subtext">010-1234-5678</span>
            </a>
        </div>

        <footer>
            <div class="visitor-badge">
                <div style="margin-bottom:5px; font-size:10px;">TOTAL VISITORS</div>
                <img src="https://seeyoufarm.com" alt="Visitors">
            </div>
            <p>© 2024 HanZhiTong. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>
</body>
</html>
