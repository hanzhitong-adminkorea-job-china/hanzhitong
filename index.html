<div class="container">

<script>
    function toggleForm() {
        const form = document.getElementById('post-form');
        const isHidden = (form.style.display === 'none' || form.style.display === '');
        form.style.display = isHidden ? 'block' : 'none';
        if(isHidden) form.scrollIntoView({ behavior: 'smooth' });
    }
    
    function initCounter() {
        const el = document.getElementById('visit-num');
        let count = localStorage.getItem('hzt_wechat_pro_count') || 50;
        count = parseInt(count) + 1;
        localStorage.setItem('hzt_wechat_pro_count', count);
        el.innerText = count.toLocaleString();
    }
    window.onload = initCounter;
</script>
