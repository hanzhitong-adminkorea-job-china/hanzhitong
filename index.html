<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩职通 - 专业的在韩华人招聘网</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #f4f7f6; color: #1a1a1a; scroll-behavior: smooth; }
        .container-custom { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>

    <!-- 상단 네비게이션 -->
    <nav class="bg-white sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="container-custom flex justify-between h-20 items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><span class="text-white font-bold text-xl">韩</span></div>
                <span class="text-2xl font-extrabold text-gray-900">韩职通</span>
            </div>
            <div class="flex items-center space-x-6">
                <a href="#jobs" class="hidden md:block font-semibold text-gray-600">最新职位</a>
                <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-700 transition shadow-md">发布招聘 (공고 등록)</button>
            </div>
        </div>
    </nav>

    <!-- 통계 바 (114114 스타일) -->
    <div class="bg-blue-50 border-b border-blue-100 py-3">
        <div class="container-custom text-center text-sm font-medium text-blue-700">
            🔥 今日新登记招聘信息 <span class="font-bold">1,248</span> 件 | 今日求职人员 <span class="font-bold">156</span> 人
        </div>
    </div>

    <!-- 메인 섹션 -->
    <header class="py-16 text-center">
        <h1 class="text-4xl md:text-5xl font-black mb-6 leading-tight">发现适合你的<br><span class="text-blue-600">在韩工作机会</span></h1>
        <div class="max-w-2xl mx-auto px-4">
            <div class="flex items-center bg-white border-2 border-blue-100 p-2 rounded-2xl shadow-xl">
                <input type="text" class="w-full p-4 outline-none" placeholder="搜索区域、职位、签证...">
                <button class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold">搜索</button>
            </div>
        </div>
    </header>

    <!-- 채용 공고 리스트 -->
    <section id="jobs" class="pb-24">
        <div class="container-custom">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">最新招聘公告 (WorkOn/114 연동)</h2>
            </div>
            
            <div class="space-y-4">
                <!-- 실제 공고 예시 1 -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center hover:border-blue-300 transition">
                    <div>
                        <div class="flex space-x-2 mb-2">
                            <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded font-bold">F-4, F-5, F-6</span>
                            <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded font-bold">05-03 登记</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900">반월공단 자동차부품 조립 및 육안검사 (남여무관)</h3>
                        <p class="text-gray-500 text-sm mt-1">📍 韩国 京畿道 始兴市 | 💰 月薪 300万-350万</p>
                    </div>
                    <button class="bg-gray-50 text-gray-900 px-4 py-2 rounded-lg font-bold border border-gray-200">查看</button>
                </div>

                <!-- 실제 공고 예시 2 -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center hover:border-blue-300 transition">
                    <div>
                        <div class="flex space-x-2 mb-2">
                            <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded font-bold">D-2, D-10</span>
                            <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded font-bold">05-03 登记</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900">明洞化妆品免税店 - 中文导购 (留学生欢迎)</h3>
                        <p class="text-gray-500 text-sm mt-1">📍 韩国 首尔市 中区 | 💰 时薪 11,000韩元</p>
                    </div>
                    <button class="bg-gray-50 text-gray-900 px-4 py-2 rounded-lg font-bold border border-gray-200">查看</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 공고 등록 팝업창 (Modal) -->
    <div id="publishModal" class="modal">
        <div class="modal-content shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-900">发布招聘信息</h2>
                <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <!-- 이 주소의 'YOUR_EMAIL' 부분을 본인의 이메일로 바꾸세요 -->
            <form action="https://formspree.io" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">公司/店铺名称</label>
                    <input type="text" name="company" required class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">职位名称 (如: 厨师, 翻译)</label>
                    <input type="text" name="job_title" required class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">月薪/时薪</label>
                        <input type="text" name="salary" placeholder="300万韩元" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">联系电话/WeChat</label>
                        <input type="text" name="contact" required class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">详细要求 (工作时间, 签证要求等)</label>
                    <textarea name="description" rows="4" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg">提交发布 (등록하기)</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('publishModal').style.display = "block"; }
        function closeModal() { document.getElementById('publishModal').style.display = "none"; }
        window.onclick = function(event) { if (event.target == document.getElementById('publishModal')) closeModal(); }
    </script>

</body>
</html>
